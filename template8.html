<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Samiha &amp; Karan · Save the Date · 12 December 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap"/>
<style>
:root{
  --burg:#6B0F1A;--burg-d:#4A0A12;--burg-m:#8B1A28;
  --gold:#B8962E;--gold-l:#D4AF50;--gold-p:#EDD98A;--gold-mu:#9A7A22;
  --ivory:#FAF7F2;--ivory-w:#F5F0E8;--ivory-d:#EDE5D8;
  --ink:#2A1A1A;--ink-s:#5C3D3D;--ink-mu:#9A8080;
  --fd:'Cormorant Garamond','Georgia',serif;
  --fs:'Playfair Display','Georgia',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:none}
body{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);
  background:#E4DDD5;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(160,140,120,.035) 2px,rgba(160,140,120,.035) 3px),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(160,140,120,.025) 2px,rgba(160,140,120,.025) 3px);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 35%,rgba(28,8,8,.20) 100%);
  pointer-events:none;z-index:0;
}
#dust-canvas{position:fixed;inset:0;pointer-events:none;z-index:1}
#glitter-canvas{position:fixed;inset:0;pointer-events:none;z-index:20}

.stage{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:22px}

.card-wrap{
  position:relative;
  width:min(360px,88vw);
  aspect-ratio:5/7;
  opacity:0;transform:translateY(14px) scale(.97);
  transition:opacity 1.2s ease,transform 1.2s cubic-bezier(.22,1,.36,1);
}
.card-wrap.enter{opacity:1;transform:none}

/* ── INVITATION ── */
.invitation{
  position:absolute;inset:0;border-radius:2px;
  background:var(--ivory);
  box-shadow:
    0 2px 4px rgba(40,10,10,.07),
    0 8px 28px rgba(40,10,10,.12),
    0 28px 72px rgba(40,10,10,.15),
    0 0 0 1px rgba(184,150,46,.18);
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}
.invitation::before{
  content:'';position:absolute;inset:0;border-radius:2px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:1;pointer-events:none;z-index:0;mix-blend-mode:multiply;
}
.invitation::after{
  content:'';position:absolute;inset:0;border-radius:2px;
  border:1px solid transparent;
  background:
    linear-gradient(var(--ivory),var(--ivory)) padding-box,
    linear-gradient(135deg,#9A7A22 0%,#D4AF50 22%,#EDD98A 38%,#D4AF50 52%,#B8962E 68%,#EDD98A 82%,#9A7A22 100%) border-box;
  background-size:100% 100%,320% 320%;
  animation:foilB 7s ease infinite;
  z-index:1;pointer-events:none;
}
@keyframes foilB{0%{background-position:100% 100%,0% 50%}50%{background-position:100% 100%,100% 50%}100%{background-position:100% 100%,0% 50%}}

.inv-inner-border{position:absolute;inset:11px;border:.5px solid rgba(184,150,46,.2);border-radius:1px;z-index:1;pointer-events:none}

.inv-content{
  position:relative;z-index:2;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:32px 28px 28px;text-align:center;
}

/* ── EYEBROW ── */
.std-label{
  font-family:var(--fs);font-size:clamp(6.5px,1.7vw,9px);font-weight:400;
  letter-spacing:.52em;text-transform:uppercase;color:var(--gold);
  opacity:0;transform:translateY(7px);
  transition:opacity .8s ease .1s,transform .8s ease .1s;
  margin-bottom:0;
}
.top-rule{
  width:44px;height:.5px;
  background:linear-gradient(90deg,transparent,var(--gold-l),transparent);
  opacity:0;transition:opacity .8s ease .2s;
  margin:14px 0 18px;
}

/* ── ILLUSTRATION ZONE ── */
.illus-zone{
  width:100%;flex-shrink:0;
  aspect-ratio:5/3.2;
  border:.5px solid rgba(184,150,46,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(155deg,var(--ivory-w) 0%,var(--ivory-d) 100%);
  position:relative;overflow:hidden;
  opacity:0;transition:opacity 1s ease .3s;
}
.illus-zone::before,.illus-zone::after{
  content:'';position:absolute;width:11px;height:11px;
  border-color:rgba(184,150,46,.35);border-style:solid;
}
.illus-zone::before{top:6px;left:6px;border-width:.5px 0 0 .5px}
.illus-zone::after{bottom:6px;right:6px;border-width:0 .5px .5px 0}
.illus-hint{
  font-family:var(--fd);font-style:italic;
  font-size:clamp(7.5px,1.9vw,9.5px);color:rgba(184,150,46,.38);
  letter-spacing:.14em;line-height:1.9;text-align:center;
}

/* ── NAMES ── */
.names-block{
  display:flex;flex-direction:column;align-items:center;
  opacity:0;transform:translateY(9px);
  transition:opacity .9s ease .45s,transform .9s ease .45s;
  padding:16px 0 0;
}
.names-line{
  font-family:var(--fd);font-style:italic;font-weight:300;
  font-size:clamp(24px,7vw,36px);
  color:var(--burg);letter-spacing:.04em;line-height:1;
  text-shadow:0 1px 10px rgba(107,15,26,.07);
}
.names-amp{font-family:var(--fd);font-style:italic;font-weight:300;font-size:.82em;color:var(--gold);display:inline-block;margin:0 .12em}

/* ── DATE ── */
.date-block{
  display:flex;flex-direction:column;align-items:center;
  opacity:0;transform:translateY(9px);
  transition:opacity .9s ease .6s,transform .9s ease .6s;
  padding:12px 0 0;
}
.date-rule{display:flex;align-items:center;gap:9px;width:75%;margin-bottom:11px}
.date-rule::before,.date-rule::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,transparent,rgba(184,150,46,.38),transparent)}
.date-gem{font-size:5px;color:var(--gold)}
.date-main{
  font-family:var(--fs);font-size:clamp(13px,3.8vw,20px);font-weight:400;
  letter-spacing:.2em;color:var(--burg);text-transform:uppercase;line-height:1;margin-bottom:5px;
}
.date-loc{
  font-family:var(--fd);font-size:clamp(7.5px,2vw,10px);font-weight:300;
  letter-spacing:.38em;text-transform:uppercase;color:var(--ink-mu);
}

/* ── CALENDAR ── */
.cal-section{
  display:flex;flex-direction:column;align-items:center;gap:9px;
  opacity:0;transition:opacity .8s ease .8s;
  padding-top:14px;width:100%;
}
.btn-cal{
  position:relative;overflow:hidden;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:12px 0;
  background:transparent;border:.5px solid var(--gold);
  color:var(--gold);font-family:var(--fs);
  font-size:clamp(6.5px,1.7vw,8.5px);font-weight:400;letter-spacing:.4em;text-transform:uppercase;
  cursor:pointer;border-radius:0;
  transition:color .45s ease,background .45s ease;
}
.btn-cal::before{
  content:'';position:absolute;inset:0;
  background:var(--burg);transform:scaleX(0);transform-origin:left;
  transition:transform .55s cubic-bezier(.22,1,.36,1);z-index:0;
}
.btn-cal:hover::before{transform:scaleX(1)}
.btn-cal:hover{color:var(--gold-p)}
.btn-cal::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(212,175,55,.16) 50%,transparent 70%);
  background-size:200% 100%;background-position:200% 0;
  animation:sheen 4s ease 2.2s infinite;z-index:1;
}
@keyframes sheen{0%{background-position:200% 0}45%{background-position:-200% 0}100%{background-position:-200% 0}}
.btn-cal span{position:relative;z-index:2}
.btn-gcal{
  font-family:var(--fd);font-size:clamp(7.5px,2vw,9.5px);font-weight:300;
  letter-spacing:.1em;color:var(--ink-mu);background:none;border:none;cursor:pointer;
  border-bottom:.5px solid transparent;padding-bottom:1px;
  transition:color .3s,border-color .3s;
}
.btn-gcal:hover{color:var(--gold-mu);border-color:var(--gold-mu)}

/* ── SCRATCH CANVAS ── */
#scratch-canvas{
  position:absolute;inset:0;border-radius:2px;
  cursor:crosshair;touch-action:none;z-index:10;
  transition:opacity 1.8s cubic-bezier(.4,0,.2,1);
}

/* ── HINT ── */
.hint-text{
  font-family:var(--fd);font-style:italic;
  font-size:clamp(11px,2.8vw,13px);letter-spacing:.1em;
  color:rgba(107,15,26,.38);
  opacity:0;transition:opacity .8s ease,transform .8s ease;
  transform:translateY(5px);text-align:center;
}
.hint-text.show{opacity:1;transform:none}
.hint-text.gone{opacity:0}

@keyframes cardPop{
  from{transform:scale(.985);box-shadow:0 2px 4px rgba(40,10,10,.07),0 8px 28px rgba(40,10,10,.12),0 28px 72px rgba(40,10,10,.15),0 0 0 1px rgba(184,150,46,.18)}
  to{transform:scale(1);box-shadow:0 2px 4px rgba(40,10,10,.07),0 8px 28px rgba(40,10,10,.13),0 32px 80px rgba(40,10,10,.18),0 0 0 1px rgba(184,150,46,.38),0 0 48px rgba(184,150,46,.07)}
}
</style>
</head>
<body>

<canvas id="dust-canvas"></canvas>
<canvas id="glitter-canvas"></canvas>

<div class="stage">
  <div class="card-wrap" id="card">

    <div class="invitation" id="invitation">
      <div class="inv-inner-border"></div>
      <div class="inv-content">

        <div style="display:flex;flex-direction:column;align-items:center">
          <div class="std-label" id="el-std">Save the Date</div>
          <div class="top-rule" id="el-rule"></div>
        </div>

        <div class="illus-zone" id="el-illus">
          <div class="illus-hint">Couple Illustration<br/><span style="font-style:normal;letter-spacing:.28em;font-size:.88em">Coming Soon</span></div>
        </div>

        <div class="names-block" id="el-names">
          <div class="names-line">Samiha <span class="names-amp">&amp;</span> Karan</div>
        </div>

        <div class="date-block" id="el-date">
          <div class="date-rule"><span class="date-gem">◆</span></div>
          <div class="date-main">12 December 2026</div>
          <div class="date-loc">Bangalore &nbsp;·&nbsp; India</div>
        </div>

        <div class="cal-section" id="el-cal">
          <button class="btn-cal" id="btn-ics"><span>Add to Calendar</span></button>
          <button class="btn-gcal" id="btn-gcal">Open in Google Calendar</button>
        </div>

      </div>
    </div>

    <canvas id="scratch-canvas"></canvas>
  </div>

  <div class="hint-text" id="hint">Scratch gently to reveal</div>
</div>

<script>
/* AMBIENT DUST */
(function(){
  const c=document.getElementById('dust-canvas'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();addEventListener('resize',resize);
  const cols=['#D4AF50','#EDD98A','#B8962E'];
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*.85+.15,op:Math.random()*.2+.03,vx:(Math.random()-.5)*.07,vy:-Math.random()*.1-.02,ph:Math.random()*Math.PI*2,ps:Math.random()*.007+.003,col:cols[0|Math.random()*3]}}
  for(let i=0;i<50;i++)ps.push(mk());
  function draw(){
    ctx.clearRect(0,0,W,H);
    ps.forEach(p=>{p.ph+=p.ps;p.x+=p.vx+Math.sin(p.ph*.7)*.04;p.y+=p.vy;if(p.y<-3){p.y=H+3;p.x=Math.random()*W}if(p.x<-3)p.x=W+3;if(p.x>W+3)p.x=-3;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle=p.col;ctx.globalAlpha=p.op*(0.4+0.6*Math.sin(p.ph));ctx.fill()});
    ctx.globalAlpha=1;requestAnimationFrame(draw)
  }
  draw();
})();

/* GLITTER */
const GC=document.getElementById('glitter-canvas'),gx=GC.getContext('2d');
let GW,GH,gps=[];
function resizeG(){GW=GC.width=innerWidth;GH=GC.height=innerHeight}
resizeG();addEventListener('resize',resizeG);
const GCOLS=['#D4AF50','#EDD98A','#B8962E','#F0D060','#FFFADC'];
function spawnDust(x,y,n=5,strong=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=strong?Math.random()*2.2+.7:Math.random()*1+.25;
    gps.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(strong?1.2:.5),
      r:strong?Math.random()*1.2+.35:Math.random()*.7+.18,
      op:strong?.85:.55,dec:Math.random()*.014+.007,grav:.035,
      col:GCOLS[0|Math.random()*5],tw:Math.random()*6.28,tws:Math.random()*.12+.04})
  }
}
function animG(){
  gx.clearRect(0,0,GW,GH);
  for(let i=gps.length-1;i>=0;i--){
    const p=gps[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.99;p.op-=p.dec;p.tw+=p.tws;
    if(p.op<=0){gps.splice(i,1);continue}
    gx.beginPath();gx.arc(p.x,p.y,p.r,0,6.28);
    gx.fillStyle=p.col;gx.globalAlpha=p.op*(0.65+0.35*Math.sin(p.tw));gx.fill();
  }
  gx.globalAlpha=1;requestAnimationFrame(animG)
}
animG();

/* SCRATCH */
const card=document.getElementById('card');
const sc=document.getElementById('scratch-canvas');
const sctx=sc.getContext('2d');
const inv=document.getElementById('invitation');
const hint=document.getElementById('hint');
let scratching=false,revealed=false;

function setupScratch(){
  const r=card.getBoundingClientRect(),dpr=devicePixelRatio||1;
  sc.width=r.width*dpr;sc.height=r.height*dpr;
  sc.style.width=r.width+'px';sc.style.height=r.height+'px';
  sctx.scale(dpr,dpr);
  drawSleeve(r.width,r.height);
}

function drawSleeve(W,H){
  sctx.clearRect(0,0,W,H);

  /* Opaque warm paper */
  sctx.fillStyle='#F8F3EC';
  sctx.fillRect(0,0,W,H);

  /* Warm centre glow */
  const wg=sctx.createRadialGradient(W*.38,H*.32,0,W*.5,H*.5,W*.7);
  wg.addColorStop(0,'rgba(255,252,242,.75)');
  wg.addColorStop(1,'rgba(232,218,198,.45)');
  sctx.fillStyle=wg;sctx.fillRect(0,0,W,H);

  /* Gold border */
  const bg=sctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'rgba(154,122,34,.65)');
  bg.addColorStop(.28,'rgba(212,175,80,.95)');
  bg.addColorStop(.5,'rgba(237,217,138,1)');
  bg.addColorStop(.72,'rgba(184,150,46,.9)');
  bg.addColorStop(1,'rgba(154,122,34,.65)');
  sctx.strokeStyle=bg;sctx.lineWidth=1.2;
  sctx.strokeRect(5,5,W-10,H-10);

  /* Inner hairline */
  sctx.strokeStyle='rgba(184,150,46,.18)';sctx.lineWidth=.5;
  sctx.strokeRect(12,12,W-24,H-24);

  /* Four minimal corner marks */
  drawCorners(W,H);

  /* Monogram */
  drawMonogram(W,H);

  /* Sleeve text */
  drawSleeveText(W,H);
}

function drawCorners(W,H){
  const s=10,p=7;
  const defs=[[p,p,1,0,0,1],[W-p,p,-1,0,0,1],[p,H-p,1,0,0,-1],[W-p,H-p,-1,0,0,-1]];
  sctx.strokeStyle='rgba(184,150,46,.5)';sctx.lineWidth=.8;
  defs.forEach(([cx,cy,sx,sy,ex,ey])=>{
    sctx.beginPath();
    sctx.moveTo(cx+sx*s,cy);sctx.lineTo(cx,cy);sctx.lineTo(cx,cy+ey*s);
    sctx.stroke();
  });
}

function drawMonogram(W,H){
  const cx=W/2,cy=H*.43;

  /* Rule above */
  const rw=W*.42;
  sctx.strokeStyle='rgba(184,150,46,.42)';sctx.lineWidth=.5;
  sctx.beginPath();sctx.moveTo(cx-rw/2,cy-58);sctx.lineTo(cx+rw/2,cy-58);sctx.stroke();

  sctx.textAlign='center';sctx.textBaseline='middle';

  /* S */
  sctx.font=`300 italic ${W*.16}px 'Cormorant Garamond',Georgia,serif`;
  sctx.fillStyle='rgba(107,15,26,.8)';
  sctx.fillText('S',cx-W*.1,cy);

  /* heart */
  sctx.font=`400 ${W*.068}px Georgia,serif`;
  sctx.fillStyle='rgba(184,150,46,.72)';
  sctx.fillText('\u2665',cx,cy+W*.004);

  /* K */
  sctx.font=`300 italic ${W*.16}px 'Cormorant Garamond',Georgia,serif`;
  sctx.fillStyle='rgba(107,15,26,.8)';
  sctx.fillText('K',cx+W*.1,cy);

  /* Rule below */
  sctx.strokeStyle='rgba(184,150,46,.42)';sctx.lineWidth=.5;
  sctx.beginPath();sctx.moveTo(cx-rw/2,cy+52);sctx.lineTo(cx+rw/2,cy+52);sctx.stroke();
}

function drawSleeveText(W,H){
  const cx=W/2;
  sctx.textAlign='center';sctx.textBaseline='middle';

  sctx.font=`300 ${W*.028}px 'Cormorant Garamond',Georgia,serif`;
  sctx.fillStyle='rgba(107,15,26,.3)';
  sctx.fillText('A wedding invitation awaits',cx,H*.74);

  sctx.font=`400 ${W*.033}px 'Playfair Display',Georgia,serif`;
  sctx.fillStyle='rgba(184,150,46,.58)';
  sctx.fillText('Reveal Our Date',cx,H*.81);

  sctx.font=`300 ${W*.02}px 'Cormorant Garamond',Georgia,serif`;
  sctx.fillStyle='rgba(107,15,26,.2)';
  sctx.fillText('\u00b7 \u00b7 \u00b7',cx,H*.875);
}

function getPos(e){
  const r=sc.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}

function scratch(x,y){
  sctx.globalCompositeOperation='destination-out';
  const g=sctx.createRadialGradient(x,y,0,x,y,26);
  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(.55,'rgba(0,0,0,.85)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  sctx.fillStyle=g;sctx.beginPath();sctx.arc(x,y,26,0,6.28);sctx.fill();
  sctx.globalCompositeOperation='source-over';

  const r=sc.getBoundingClientRect();
  spawnDust(r.left+x,r.top+y,4);
  checkReveal();
}

function checkReveal(){
  if(revealed)return;
  const d=sctx.getImageData(0,0,sc.width,sc.height).data;
  let t=0;for(let i=3;i<d.length;i+=4)if(d[i]<100)t++;
  if(t/(sc.width*sc.height)>.43)doReveal();
}

function doReveal(){
  revealed=true;
  hint.classList.add('gone');
  sc.style.opacity='0';
  setTimeout(()=>sc.style.display='none',2000);

  /* Gentle card pop */
  inv.style.animation='cardPop .95s cubic-bezier(.22,1,.36,1) forwards';

  /* Refined gold dust burst — 4 gentle waves */
  const r=card.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let w=0;w<4;w++){
    setTimeout(()=>{
      for(let i=0;i<7;i++){
        const ox=(Math.random()-.5)*r.width*.52,oy=(Math.random()-.5)*r.height*.42;
        spawnDust(cx+ox,cy+oy,5,true);
      }
    },w*200);
  }

  /* Sequential content reveal */
  const seq=[
    {id:'el-std',  delay:180},
    {id:'el-rule', delay:300},
    {id:'el-illus',delay:440},
    {id:'el-names',delay:600},
    {id:'el-date', delay:760},
    {id:'el-cal',  delay:920},
  ];
  seq.forEach(({id,delay})=>{
    setTimeout(()=>{
      const el=document.getElementById(id);
      if(!el)return;
      el.style.opacity='1';
      if(el.style.transform!==undefined)el.style.transform='translateY(0)';
    },delay);
  });
}

sc.addEventListener('mousedown',e=>{scratching=true;const p=getPos(e);scratch(p.x,p.y)},{passive:true});
sc.addEventListener('mousemove',e=>{if(!scratching)return;const p=getPos(e);scratch(p.x,p.y)},{passive:true});
sc.addEventListener('mouseup',()=>scratching=false);
sc.addEventListener('mouseleave',()=>scratching=false);
sc.addEventListener('touchstart',e=>{e.preventDefault();scratching=true;const p=getPos(e);scratch(p.x,p.y)},{passive:false});
sc.addEventListener('touchmove',e=>{e.preventDefault();if(!scratching)return;const p=getPos(e);scratch(p.x,p.y)},{passive:false});
sc.addEventListener('touchend',()=>scratching=false);

/* CALENDAR */
document.getElementById('btn-ics').addEventListener('click',()=>{
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Samiha & Karan//STD//EN',
    'BEGIN:VEVENT','DTSTART;VALUE=DATE:20261212','DTEND;VALUE=DATE:20261213',
    'SUMMARY:Samiha & Karan \u2014 Wedding','LOCATION:Bangalore, India',
    'DESCRIPTION:Save the Date for Samiha & Karan\'s Wedding \u00b7 12 December 2026 \u00b7 Bangalore, India',
    'STATUS:CONFIRMED','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  a.download='samiha-karan-wedding.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
});
document.getElementById('btn-gcal').addEventListener('click',()=>{
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=Samiha+%26+Karan+Wedding&dates=20261212%2F20261213&location=Bangalore%2C+India&details=Save+the+Date+for+Samiha+%26+Karan%27s+Wedding','_blank');
});

addEventListener('resize',()=>{if(!revealed)setupScratch()});
