<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Samiha &amp; Karan · Save the Date</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#FFFDF7;-webkit-tap-highlight-color:transparent;touch-action:none}
body{
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',Georgia,serif;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, #fff8f0 0%, #FFFDF7 60%, #f9f0e8 100%);
  position:relative;overflow:hidden;
}

/* Background sparkles canvas */
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}

/* Vignette */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 85% 85% at 50% 50%, transparent 55%, rgba(60,0,10,0.18) 100%);
}

/* ── CARD WRAPPER ── */
.card-wrap{
  position:relative;z-index:2;
  width:min(340px, 88vw);
  aspect-ratio:9/16;
  user-select:none;
}

/* ── INVITATION (bottom layer) ── */
.invitation{
  position:absolute;inset:0;
  background:#FFFDF7;
  border-radius:4px;
  box-shadow:
    0 0 0 1px rgba(212,175,55,0.35),
    0 8px 40px rgba(80,0,20,0.18),
    0 2px 8px rgba(80,0,20,0.1),
    inset 0 0 60px rgba(212,175,55,0.06);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 28px;
  text-align:center;
  gap:0;
  overflow:hidden;
}

/* Gold glow border pulse */
.invitation::before{
  content:'';position:absolute;inset:-1px;border-radius:5px;
  background:linear-gradient(135deg,#D4AF37,#f5e07a,#D4AF37,#a07c10,#D4AF37);
  background-size:300% 300%;
  animation:shimmerBorder 4s ease infinite;
  z-index:0;
  opacity:0;transition:opacity 1.2s ease;
}
.invitation.revealed::before{opacity:1}
@keyframes shimmerBorder{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.invitation::after{
  content:'';position:absolute;inset:1px;border-radius:3px;
  background:#FFFDF7;z-index:1;
}

.inv-inner{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;gap:0}

.save-label{
  font-family:'Playfair Display',serif;
  font-size:clamp(8px,2.2vw,11px);
  font-weight:400;letter-spacing:.45em;text-transform:uppercase;
  color:#C9A227;
  opacity:0;transform:translateY(12px);
  transition:opacity .9s ease .1s, transform .9s ease .1s;
  margin-bottom:10px;
}
.the-date-label{
  font-family:'Playfair Display',serif;
  font-size:clamp(8px,2.2vw,11px);
  font-weight:400;letter-spacing:.45em;text-transform:uppercase;
  color:#C9A227;
  opacity:0;transform:translateY(12px);
  transition:opacity .9s ease .2s, transform .9s ease .2s;
  margin-bottom:22px;
}

.ornament-top{
  font-size:clamp(18px,5vw,26px);
  opacity:0;transform:scale(.8);
  transition:opacity .8s ease .3s, transform .8s ease .3s;
  line-height:1;
  filter:sepia(1) saturate(3) hue-rotate(-10deg) brightness(.8);
  margin-bottom:14px;
}

.names{
  font-family:'Great Vibes',cursive;
  font-size:clamp(36px,11vw,52px);
  color:#7B001C;
  line-height:1.1;
  opacity:0;transform:translateY(16px);
  transition:opacity 1s ease .4s, transform 1s ease .4s;
  text-shadow:0 2px 20px rgba(123,0,28,0.15);
  margin-bottom:6px;
}

.ampersand-line{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(13px,3.5vw,17px);
  color:#a07c10;
  letter-spacing:.1em;
  opacity:0;
  transition:opacity .8s ease .5s;
  margin-bottom:20px;
}

.divider{
  display:flex;align-items:center;gap:10px;
  width:68%;
  opacity:0;
  transition:opacity .8s ease .55s;
  margin-bottom:20px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:.5px;
  background:linear-gradient(90deg,transparent,#D4AF37,transparent);
}
.divider-gem{font-size:9px;color:#D4AF37}

.date{
  font-family:'Playfair Display',serif;
  font-size:clamp(14px,4vw,20px);
  font-weight:400;
  color:#7B001C;
  letter-spacing:.12em;
  opacity:0;transform:translateY(10px);
  transition:opacity .9s ease .6s, transform .9s ease .6s;
  margin-bottom:5px;
}
.location{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(10px,2.8vw,13px);
  font-weight:300;letter-spacing:.3em;text-transform:uppercase;
  color:#9B8230;
  opacity:0;
  transition:opacity .8s ease .72s;
  margin-bottom:22px;
}

.tagline{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(11px,3vw,14px);
  color:rgba(123,0,28,.55);
  opacity:0;
  transition:opacity .8s ease .82s;
  line-height:1.6;
  max-width:220px;
  margin-bottom:28px;
}

/* ── CALENDAR BUTTON ── */
.cal-wrap{
  opacity:0;transform:translateY(8px);
  transition:opacity .8s ease .95s,transform .8s ease .95s;
  width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;
}
.btn-cal{
  position:relative;overflow:hidden;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,#7B001C,#990F24);
  color:#D4AF37;
  font-family:'Playfair Display',serif;
  font-size:clamp(8px,2.2vw,10px);
  font-weight:400;letter-spacing:.3em;text-transform:uppercase;
  padding:11px 26px;
  border:none;cursor:pointer;
  border-radius:1px;
  box-shadow:0 4px 20px rgba(123,0,28,.35);
  transition:transform .2s,box-shadow .2s;
}
.btn-cal::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,55,.0),rgba(212,175,55,.22),rgba(212,175,55,.0));
  background-size:200% 100%;background-position:200% 0;
  animation:btnShimmer 2.5s ease 1.2s infinite;
}
@keyframes btnShimmer{
  0%{background-position:200% 0}60%{background-position:-200% 0}100%{background-position:-200% 0}
}
.btn-cal:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(123,0,28,.45)}
.btn-cal:active{transform:translateY(0)}

.btn-gcal{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Cormorant Garamond',serif;font-size:clamp(9px,2.4vw,11px);
  font-weight:300;letter-spacing:.12em;
  color:#a07c10;background:none;border:none;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;
  transition:color .2s;padding:0;
}
.btn-gcal:hover{color:#7B001C}

/* ── SCRATCH CANVAS ── */
#scratch-canvas{
  position:absolute;inset:0;border-radius:4px;
  cursor:crosshair;touch-action:none;
  transition:opacity 1.4s ease;
  z-index:10;
}

/* ── HINT TEXT ── */
.hint{
  position:absolute;bottom:-36px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(11px,3vw,13px);letter-spacing:.08em;
  color:rgba(123,0,28,.5);
  white-space:nowrap;
  transition:opacity .5s;
  z-index:5;
}
.hint.hidden{opacity:0}

/* Entrance animation */
.card-wrap{opacity:0;transform:scale(.96) translateY(10px);transition:opacity 1.1s ease .2s,transform 1.1s ease .2s}
.card-wrap.enter{opacity:1;transform:none}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="card-wrap" id="card">
  <!-- Invitation layer -->
  <div class="invitation" id="invitation">
    <div class="inv-inner">
      <div class="save-label" id="t1">Save</div>
      <div class="the-date-label" id="t2">The Date</div>
      <div class="ornament-top" id="t3">✦ ❧ ✦</div>
      <div class="names" id="t4">Samiha &amp; Karan</div>
      <div class="ampersand-line" id="t5">are getting married</div>
      <div class="divider" id="t6"><span class="divider-gem">◆</span></div>
      <div class="date" id="t7">12 · December · 2026</div>
      <div class="location" id="t8">Bangalore, India</div>
      <div class="tagline" id="t9">"We can't wait to<br/>celebrate with you"</div>
      <div class="cal-wrap" id="t10">
        <button class="btn-cal" id="btn-ics">
          <span>✦</span> Add to Calendar
        </button>
        <button class="btn-gcal" id="btn-gcal">+ Open in Google Calendar</button>
      </div>
    </div>
  </div>

  <!-- Scratch canvas (top) -->
  <canvas id="scratch-canvas"></canvas>

  <!-- Hint -->
  <div class="hint" id="hint">Scratch to reveal ✦</div>
</div>

<script>
/* ══════════════════════════════════════
   BACKGROUND AMBIENT SPARKLES
══════════════════════════════════════ */
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,particles=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  function mkBg(){
    return{
      x:Math.random()*W, y:Math.random()*H,
      size:Math.random()*1.5+.3,
      opacity:Math.random()*.4+.05,
      vx:(Math.random()-.5)*.12,
      vy:(Math.random()-.5)*.12,
      pulse:Math.random()*Math.PI*2,
      pulseSpeed:Math.random()*.015+.008,
      col:['#D4AF37','#f5e07a','#e8c96a','#fff8e0'][Math.floor(Math.random()*4)]
    }
  }
  for(let i=0;i<90;i++){const p=mkBg();p.x=Math.random()*W;p.y=Math.random()*H;particles.push(p)}
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.pulse+=p.pulseSpeed;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      const op=p.opacity*(0.5+0.5*Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.col;ctx.globalAlpha=op;ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════
   GLITTER PARTICLE SYSTEM
══════════════════════════════════════ */
const glitterParticles=[];
const glitterCanvas=document.createElement('canvas');
glitterCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:20';
document.body.appendChild(glitterCanvas);
let GW,GH;
function resizeGlitter(){GW=glitterCanvas.width=window.innerWidth;GH=glitterCanvas.height=window.innerHeight}
resizeGlitter();window.addEventListener('resize',resizeGlitter);
const gCtx=glitterCanvas.getContext('2d');
const GCOLS=['#D4AF37','#f5e07a','#fff8e0','#e8c96a','#fffde0','#C9A227','#ffd700'];

function spawnGlitter(x,y,count=14,burst=false){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=burst?(Math.random()*7+3):(Math.random()*3+1);
    const size=burst?(Math.random()*3+1.2):(Math.random()*2.2+.5);
    glitterParticles.push({
      x,y,
      vx:Math.cos(angle)*speed*(burst?.8:1),
      vy:Math.sin(angle)*speed*(burst?.8:1)-( burst?3:1.5),
      size,
      opacity:1,
      decay:Math.random()*.025+.012,
      gravity:.12,
      col:GCOLS[Math.floor(Math.random()*GCOLS.length)],
      rotation:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-.5)*.2,
      shape:Math.random()>.5?'star':'circle'
    });
  }
}

function drawStar(ctx,x,y,r,col,op,rot){
  ctx.save();ctx.globalAlpha=op;ctx.translate(x,y);ctx.rotate(rot);
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*Math.PI*.4-Math.PI/2;
    const a2=a+Math.PI*.2;
    if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    ctx.lineTo(Math.cos(a2)*r*.4,Math.sin(a2)*r*.4);
  }
  ctx.closePath();ctx.fillStyle=col;ctx.fill();
  ctx.restore();
}

function animateGlitter(){
  gCtx.clearRect(0,0,GW,GH);
  for(let i=glitterParticles.length-1;i>=0;i--){
    const p=glitterParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;
    p.vx*=.98;p.opacity-=p.decay;p.rotation+=p.rotSpeed;
    if(p.opacity<=0){glitterParticles.splice(i,1);continue}
    if(p.shape==='star'){
      drawStar(gCtx,p.x,p.y,p.size,p.col,p.opacity,p.rotation);
    } else {
      gCtx.beginPath();gCtx.arc(p.x,p.y,p.size*.7,0,Math.PI*2);
      gCtx.fillStyle=p.col;gCtx.globalAlpha=p.opacity;gCtx.fill();
    }
  }
  gCtx.globalAlpha=1;
  requestAnimationFrame(animateGlitter);
}
animateGlitter();

/* ══════════════════════════════════════
   SCRATCH CANVAS SETUP
══════════════════════════════════════ */
const card=document.getElementById('card');
const scratchCanvas=document.getElementById('scratch-canvas');
const sCtx=scratchCanvas.getContext('2d');
const invitation=document.getElementById('invitation');
const hint=document.getElementById('hint');

function setupScratch(){
  const rect=card.getBoundingClientRect();
  scratchCanvas.width=rect.width*devicePixelRatio;
  scratchCanvas.height=rect.height*devicePixelRatio;
  scratchCanvas.style.width=rect.width+'px';
  scratchCanvas.style.height=rect.height+'px';
  sCtx.scale(devicePixelRatio,devicePixelRatio);
  drawOverlay(rect.width,rect.height);
}

function drawOverlay(W,H){
  sCtx.clearRect(0,0,W,H);

  /* ── BASE FILL ── */
  sCtx.fillStyle='#FFFDF7';
  sCtx.fillRect(0,0,W,H);

  /* ── BACKGROUND TEXTURE WASH ── */
  const bgGrad=sCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.8);
  bgGrad.addColorStop(0,'rgba(152,8,36,0.04)');
  bgGrad.addColorStop(1,'rgba(123,0,28,0.01)');
  sCtx.fillStyle=bgGrad;sCtx.fillRect(0,0,W,H);

  /* ── OUTER LACE BORDER (SVG-style path in canvas) ── */
  drawLaceBorder(W,H);

  /* ── OVAL CENTER PANEL ── */
  drawOvalPanel(W,H);

  /* ── CENTER TEXT ON OVERLAY ── */
  drawOverlayText(W,H);

  /* ── GOLD FOIL CORNERS ── */
  drawCornerOrnaments(W,H);

  /* ── SUBTLE OVERLAY WATERMARK ── */
  sCtx.font=`${W*.028}px 'Cormorant Garamond',serif`;
  sCtx.fillStyle='rgba(123,0,28,0.12)';
  sCtx.textAlign='center';
  sCtx.fillText('— scratch to reveal —',W/2,H*.92);
}

function drawLaceBorder(W,H){
  const pad=8;
  /* Outer rect border */
  sCtx.strokeStyle='rgba(212,175,55,0.55)';
  sCtx.lineWidth=.8;
  roundRect(sCtx,pad,pad,W-pad*2,H-pad*2,3);
  sCtx.stroke();

  sCtx.strokeStyle='rgba(123,0,28,0.4)';
  sCtx.lineWidth=.5;
  roundRect(sCtx,pad+5,pad+5,W-pad*2-10,H-pad*2-10,2);
  sCtx.stroke();

  /* Lace dot pattern along border */
  sCtx.fillStyle='rgba(123,0,28,0.18)';
  const step=12;
  for(let x=pad+6;x<W-pad-6;x+=step){
    drawLaceDot(sCtx,x,pad+2,2.5);
    drawLaceDot(sCtx,x,H-pad-2,2.5);
  }
  for(let y=pad+18;y<H-pad-18;y+=step){
    drawLaceDot(sCtx,pad+2,y,2.5);
    drawLaceDot(sCtx,W-pad-2,y,2.5);
  }

  /* Floral corner blocks */
  const bs=W*.18;
  const corners=[[pad+2,pad+2],[W-pad-2-bs,pad+2],[pad+2,H-pad-2-bs],[W-pad-2-bs,H-pad-2-bs]];
  corners.forEach(([cx,cy])=>drawLaceBlock(sCtx,cx,cy,bs));
}

function drawLaceDot(ctx,x,y,r){
  ctx.beginPath();ctx.arc(x,y,r*.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(123,0,28,0.12)';ctx.lineWidth=.4;ctx.stroke();
}

function drawLaceBlock(ctx,x,y,size){
  const s=size;
  /* Grid of circles */
  const cols=5,rows=5,cr=s/(cols*2+1);
  ctx.fillStyle='rgba(123,0,28,0.15)';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const bx=x+c*(s/cols)+s/(cols*2);
      const by=y+r*(s/rows)+s/(rows*2);
      ctx.beginPath();ctx.arc(bx,by,cr*.7,0,Math.PI*2);ctx.fill();
    }
  }
  /* Border */
  ctx.strokeStyle='rgba(212,175,55,0.4)';ctx.lineWidth=.6;
  ctx.strokeRect(x,y,s,s);
}

function drawOvalPanel(W,H){
  const cx=W/2,cy=H*.47;
  const rx=W*.36,ry=H*.33;

  /* Shadow */
  sCtx.save();
  sCtx.shadowColor='rgba(80,0,20,0.35)';sCtx.shadowBlur=22;sCtx.shadowOffsetY=4;
  sCtx.beginPath();sCtx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  const panelGrad=sCtx.createRadialGradient(cx,cy-ry*.2,0,cx,cy,rx);
  panelGrad.addColorStop(0,'#990F24');
  panelGrad.addColorStop(.5,'#7B001C');
  panelGrad.addColorStop(1,'#5a0012');
  sCtx.fillStyle=panelGrad;sCtx.fill();
  sCtx.restore();

  /* Gold rim (outer) */
  sCtx.save();
  sCtx.beginPath();sCtx.ellipse(cx,cy,rx+3,ry+3,0,0,Math.PI*2);
  sCtx.strokeStyle='rgba(212,175,55,0.7)';sCtx.lineWidth=1.8;sCtx.stroke();

  /* Gold rim (inner) */
  sCtx.beginPath();sCtx.ellipse(cx,cy,rx-6,ry-6,0,0,Math.PI*2);
  sCtx.strokeStyle='rgba(212,175,55,0.35)';sCtx.lineWidth=.8;sCtx.stroke();
  sCtx.restore();

  /* Sparkle dots on rim */
  sCtx.fillStyle='rgba(212,175,55,0.65)';
  for(let a=0;a<Math.PI*2;a+=Math.PI/18){
    const sx=cx+Math.cos(a)*(rx+1);
    const sy=cy+Math.sin(a)*(ry+1);
    sCtx.beginPath();sCtx.arc(sx,sy,1,0,Math.PI*2);sCtx.fill();
  }

  /* Lace scallop edge */
  sCtx.strokeStyle='rgba(255,200,180,0.15)';sCtx.lineWidth=.6;
  for(let a=0;a<Math.PI*2;a+=Math.PI/32){
    const bx=cx+Math.cos(a)*(rx-12);
    const by=cy+Math.sin(a)*(ry-12);
    sCtx.beginPath();sCtx.arc(bx,by,3,0,Math.PI*2);sCtx.stroke();
  }
}

function drawCornerOrnaments(W,H){
  const positions=[
    [W*.14,H*.12],[W*.86,H*.12],
    [W*.14,H*.82],[W*.86,H*.82]
  ];
  sCtx.fillStyle='rgba(212,175,55,0.7)';
  sCtx.font=`${W*.06}px serif`;
  sCtx.textAlign='center';sCtx.textBaseline='middle';
  const symbols=['❧','❧','❧','❧'];
  positions.forEach(([x,y],i)=>{
    sCtx.save();
    if(i===1)sCtx.scale(-1,1),sCtx.translate(-W,0);
    if(i===2)sCtx.scale(1,-1),sCtx.translate(0,-H);
    if(i===3)sCtx.scale(-1,-1),sCtx.translate(-W,-H);
    sCtx.fillText(symbols[i],i%2===0?x:W-x,i<2?y:H-y);
    sCtx.restore();
  });

  /* Gold diamond accents */
  sCtx.fillStyle='rgba(212,175,55,0.6)';
  const dm=[[W/2,H*.085],[W/2,H*.915],[W*.065,H/2],[W*.935,H/2]];
  dm.forEach(([x,y])=>{
    sCtx.save();sCtx.translate(x,y);sCtx.rotate(Math.PI/4);
    sCtx.fillRect(-3.5,-3.5,7,7);
    sCtx.restore();
  });
}

function drawOverlayText(W,H){
  const cx=W/2,cy=H*.47;

  /* "WE ARE" */
  sCtx.font=`300 ${W*.032}px 'Cormorant Garamond',serif`;
  sCtx.fillStyle='rgba(255,240,210,0.55)';
  sCtx.textAlign='center';sCtx.letterSpacing='0.3em';
  sCtx.fillText('WE ARE',cx,cy-H*.12);

  /* "GETTING MARRIED" */
  sCtx.font=`300 ${W*.028}px 'Cormorant Garamond',serif`;
  sCtx.fillStyle='rgba(255,240,210,0.45)';
  sCtx.fillText('GETTING MARRIED',cx,cy-H*.085);

  /* Names */
  sCtx.font=`${W*.115}px 'Great Vibes',cursive`;
  sCtx.fillStyle='rgba(255,248,225,0.92)';
  sCtx.shadowColor='rgba(0,0,0,0.3)';sCtx.shadowBlur=8;
  sCtx.fillText('Samiha & Karan',cx,cy+H*.03);
  sCtx.shadowBlur=0;

  /* Date */
  sCtx.font=`400 ${W*.038}px 'Playfair Display',serif`;
  sCtx.fillStyle='rgba(255,235,180,0.75)';
  sCtx.fillText('· 12 December 2026 ·',cx,cy+H*.1);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

/* ══════════════════════════════════════
   SCRATCH LOGIC
══════════════════════════════════════ */
let isScratching=false;
let revealed=false;
let totalPixels=0;
const REVEAL_THRESHOLD=0.42;

function getCardPos(e){
  const rect=scratchCanvas.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return{x:touch.clientX-rect.left, y:touch.clientY-rect.top};
}

function scratch(x,y){
  sCtx.globalCompositeOperation='destination-out';
  sCtx.beginPath();
  sCtx.arc(x,y,22,0,Math.PI*2);
  sCtx.fill();
  /* Soft outer erase */
  const grad=sCtx.createRadialGradient(x,y,8,x,y,28);
  grad.addColorStop(0,'rgba(0,0,0,1)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  sCtx.fillStyle=grad;
  sCtx.beginPath();sCtx.arc(x,y,28,0,Math.PI*2);sCtx.fill();
  sCtx.globalCompositeOperation='source-over';

  /* Spawn glitter at real screen position */
  const rect=scratchCanvas.getBoundingClientRect();
  spawnGlitter(rect.left+x,rect.top+y,8);

  checkReveal();
}

function checkReveal(){
  if(revealed)return;
  const imageData=sCtx.getImageData(0,0,scratchCanvas.width,scratchCanvas.height);
  const pixels=imageData.data;
  let transparent=0;
  for(let i=3;i<pixels.length;i+=4){
    if(pixels[i]<128)transparent++;
  }
  const pct=transparent/(scratchCanvas.width*scratchCanvas.height);
  if(pct>REVEAL_THRESHOLD)triggerReveal();
}

function triggerReveal(){
  revealed=true;
  hint.classList.add('hidden');

  /* Fade out scratch layer */
  scratchCanvas.style.opacity='0';
  setTimeout(()=>scratchCanvas.style.display='none',1500);

  /* Gold border glow */
  invitation.classList.add('revealed');

  /* Big glitter burst */
  const rect=card.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<6;i++){
    setTimeout(()=>spawnGlitter(cx+((Math.random()-.5)*rect.width*.6),cy+((Math.random()-.5)*rect.height*.6),28,true),i*120);
  }

  /* Animate text in */
  const targets=[
    document.getElementById('t1'),document.getElementById('t2'),
    document.getElementById('t3'),document.getElementById('t4'),
    document.getElementById('t5'),document.getElementById('t6'),
    document.getElementById('t7'),document.getElementById('t8'),
    document.getElementById('t9'),document.getElementById('t10')
  ];
  targets.forEach(el=>{if(el)el.style.opacity='1';el&&(el.style.transform='none')});
}

/* Event listeners */
scratchCanvas.addEventListener('mousedown',e=>{isScratching=true;const p=getCardPos(e);scratch(p.x,p.y)},{passive:true});
scratchCanvas.addEventListener('mousemove',e=>{if(!isScratching)return;const p=getCardPos(e);scratch(p.x,p.y)},{passive:true});
scratchCanvas.addEventListener('mouseup',()=>isScratching=false);
scratchCanvas.addEventListener('touchstart',e=>{e.preventDefault();isScratching=true;const p=getCardPos(e);scratch(p.x,p.y)},{passive:false});
scratchCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isScratching)return;const p=getCardPos(e);scratch(p.x,p.y)},{passive:false});
scratchCanvas.addEventListener('touchend',()=>isScratching=false);
